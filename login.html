<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySync - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>StudySync</h1>
    </header>

    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>
        <a href="about.html">About Us</a>
    </nav>

    <section class="form-container">
        <h2>Login</h2>

        <!-- (b) Form Validation — handled by loginMessage() in script.js -->
        <form onsubmit="return loginMessage()">
            <label for="studentId">Student ID:</label>
            <!-- Fixed: id updated to "studentId" to match script.js -->
            <input type="number" id="studentId" placeholder="Enter your Student ID" required>

            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Enter your password" required>

            <!-- (d) Event: onclick also triggers showPasswordStrength on input -->
            <button type="submit" style="background-color: #2d89ef; color: white;">Login</button>
        </form>

        <!-- (c) Dynamic Element — password strength bar -->
        <div id="strengthBar" style="display:none; margin-top: -10px; margin-bottom: 12px;">
            <div id="strengthFill" style="height:6px; border-radius:4px; width:0%; transition:0.3s; background:red;"></div>
            <small id="strengthLabel" style="color:#888;"></small>
        </div>

        <p id="loginResult"></p>
    </section>

    <footer>
        <p>&copy; 2026 StudySync</p>
    </footer>

    <script src="script.js"></script>
   
</body>
</html>
